<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft Mob Guesser - Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="game-page">
        <div class="game-container">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="mob-display">
                <img id="mobImage" src="" alt="Minecraft Mob">
            </div>
            <div class="question">What mob is this?</div>
            <div class="options">
                <button class="option-button" onclick="guessOption(this)"></button>
                <button class="option-button" onclick="guessOption(this)"></button>
                <button class="option-button" onclick="guessOption(this)"></button>
                <button class="option-button" onclick="guessOption(this)"></button>
            </div>
            <div class="feedback" id="feedback"></div>
            <button class="next-button" id="nextButton" onclick="nextMob()" style="display: none;">Next Mob</button>
            <button class="back-button" onclick="goHome()">Back to Home</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
